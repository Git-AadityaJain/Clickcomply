services:
  ollama:
    image: ollama/ollama:latest
    container_name: clickcomply-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # One-shot: pulls the models ClickComply needs, then exits.
  ollama-pull:
    image: ollama/ollama:latest
    container_name: clickcomply-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull llama3.2 && ollama pull nomic-embed-text"]
    restart: "no"

  backend:
    build:
      context: ./backend
    container_name: clickcomply-backend
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
      - OLLAMA_EMBEDDING_MODEL=nomic-embed-text
      - DATABASE_URL=sqlite+aiosqlite:////app/data/clickcomply.db
      - UPLOAD_DIR=/app/uploads
      - CHROMA_DIR=/app/chroma_data
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
      - backend_chroma:/app/chroma_data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle; the browser hits the host-mapped port.
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: clickcomply-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_models:
  backend_data:
  backend_uploads:
  backend_chroma:
